{% set name = "fastkml" %}
{% set version = "1.4.0" %}
{% set python_min = "3.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fastkml-{{ version }}.tar.gz
  sha256: f9e09062f2e6557acb3618ecf6783a9329f4bb3f7e1d070a1b4d7bfab718e278

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - setuptools
    - pip
    - python {{ python_min }}
  run:
    - arrow
    - pygeoif >=1.5
    - typing-extensions >4
    - python >={{ python_min }}

test:
  imports:
    - fastkml
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}
about:
  home: "https://github.com/cleder/fastkml"
  license: LGPL-2.1-only
  license_file: LICENSE.txt
  summary: "Fast KML processing in python"
  doc_url: "https://pypi.org/project/fastkml/"

extra:
  recipe-maintainers:
    - mxr-conda
    - ReimarBauer
